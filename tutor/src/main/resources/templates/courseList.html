<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<div class="search-section">
    <form th:action="@{/view/courses}" method="get">
        <input type="text" name="name" th:value="${currentName}" placeholder="搜尋老師姓名...">

        <select name="subject">
            <option value="">所有科目</option>
            <option value="1" th:selected="${currentSubject == 1}">英文</option>
            <option value="2" th:selected="${currentSubject == 2}">程式</option>
        </select>

        <select name="priceRange">
            <option value="">所有價格</option>
            <option value="300-500" th:selected="${currentPrice == '300-500'}">$300 - $500</option>
            <option value="501-700" th:selected="${currentPrice == '501-700'}">$501 - $700</option>
            <option value="701-900" th:selected="${currentPrice == '701-900'}">$701 - $900</option>
        </select>

        <input type="date" name="date" th:value="${currentDate}">
        <input type="number" name="hour" th:value="${currentHour}" min="9" max="21" placeholder="小時(9-21)">

        <button type="submit">立即搜尋</button>
    </form>
</div>

<table>
    <thead>
        <tr>
            <th>老師</th>
            <th>科目</th>
            <th>等級</th>
            <th>介紹</th>
            <th>上課時間</th>
            <th>價格</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="c : ${courses}">
            <td th:text="${c.user.name}"></td>
            <td th:text="${c.subject == 1 ? '英文' : '程式'}"></td>
            <td th:text="${c.level == 1 ? '初級' : (c.level == 2 ? '中級' : '高級')}"></td>
            <td th:text="${c.description}"></td>
            <td>
                <span th:text="${currentDate}"></span> 
                <span th:text="${currentHour + ':00'}"></span>
            </td>
            <td th:text="${'$' + c.price}"></td>
        </tr>
    </tbody>
</table>
</body>
</html>
