<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課程列表</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background-color: #f8f8f8; }
    .filter-buttons button { margin-right: 10px; padding: 5px 10px; cursor: pointer; }
    .pagination ul { list-style-type:none; display:flex; justify-content:center; padding:0; }
    .pagination li { margin:0 5px; }
    .pagination a.active { font-weight:bold; color:#FF8E53; }

    /* 浮動課表視窗 */
    #floatingCalendar {
        display: none;
        position: absolute;
        z-index: 9999;
        width: 500px;
        pointer-events: none;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        border: 2px solid #FF8E53;
        transition: opacity 0.2s;
        background: #fff;
    }
    .bg-available { background-color: #4CAF50; }   /* 綠色 */
    .bg-booked { background-color: #FF9800; }      /* 橘色 */
    .bg-unavailable { background-color: #9E9E9E; } /* 灰色 */
</style>
</head>
<body>
    <div class="search-section">
        <form th:action="@{/view/courses}" method="get">
            <input type="text" name="teacherName" th:value="${currentTeacherName}" placeholder="搜尋老師姓名...">

            <div class="filter-buttons">
                <button type="submit" name="courseName" value="基礎英文">基礎英文</button>
                <button type="submit" name="courseName" value="英文中級聽力">英文中級聽力</button>
                <button type="submit" name="courseName" value="Python">Python</button>
            </div>

            <select name="subject">
                <option value="">所有科目</option>
                <option value="1" th:selected="${currentSubject == 1}">英文</option>
                <option value="2" th:selected="${currentSubject == 2}">程式</option>
            </select>

            <select name="priceRange">
                <option value="">所有價格</option>
                <option value="300-500" th:selected="${currentPriceRange == '300-500'}">$300 - $500</option>
                <option value="501-700" th:selected="${currentPriceRange == '501-700'}">$501 - $700</option>
                <option value="701-900" th:selected="${currentPriceRange == '701-900'}">$701 - $900</option>
            </select>

            <input type="date" name="date" th:value="${currentDate}">
            <input type="number" name="hour" th:value="${currentHour}" min="9" max="21" placeholder="小時(9-21)">

            <button type="submit">立即搜尋</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>老師</th>
                <th>課程標題</th>
                <th>科目</th>
                <th>等級</th>
                <th>介紹</th>
                <th>課表</th>
                <th>價格</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.user.name}"></td>
                <td th:text="${c.name}"></td>
                <td th:text="${c.subject == 1 ? '英文' : '程式'}"></td>
                <td th:text="${c.level == 1 ? '初級' : (c.level == 2 ? '中級' : '高級')}"></td>
                <td th:text="${c.description}"></td>
                <td>
                    <div class="schedule-trigger"
                         th:attr="onmouseenter=|showCalendar(event, '${c.user.name}', ${c.user.id})|, onclick=|pinCalendar(event, '${c.user.name}', ${c.user.id})|"
                         onmousemove="moveCalendar(event)"
                         onmouseleave="hideCalendar()">
                        <span style="color: #6C63FF; cursor: pointer; border-bottom: 1px dashed #6C63FF;">
						    <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">calendar_month</span>
						    查看課表
						</span>
                    </div>
                </td>
                <td th:text="${'$' + c.price}"></td>
            </tr>
        </tbody>
    </table>

    <!-- 分頁導航 -->
    <div class="pagination">
        <ul>
            <li th:if="${currentPage > 0}">
                <a th:href="@{/view/courses(page=${currentPage - 1}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subject=${currentSubject}, level=${currentLevel}, priceRange=${currentPriceRange}, date=${currentDate}, hour=${currentHour})}">
                    上一頁
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/view/courses(page=${i}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subject=${currentSubject}, level=${currentLevel}, priceRange=${currentPriceRange}, date=${currentDate}, hour=${currentHour})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? 'active' : ''">
                </a>
            </li>
            <li th:if="${currentPage < totalPages - 1}">
                <a th:href="@{/view/courses(page=${currentPage + 1}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subject=${currentSubject}, level=${currentLevel}, priceRange=${currentPriceRange}, date=${currentDate}, hour=${currentHour})}">
                    下一頁
                </a>
            </li>
        </ul>
    </div>

    <!-- 浮動課表視窗 -->
	<div id="floatingCalendar">
	    <header class="p-4 bg-gradient-to-r from-primary to-orange-400 text-white">
	        <h3 class="text-xl font-bold" id="calTeacherName">老師課表</h3>
	        <p class="text-xs opacity-90">目前開放預約時段 (僅供參考)</p>
	    </header>
	
	    <div class="p-4 bg-white">
	        <table style="width:100%; border-collapse: collapse; font-size: 12px; text-align: center;">
	            <thead>
	                <tr>
	                    <th>時間</th>
	                    <th>Mon</th>
	                    <th>Tue</th>
	                    <th>Wed</th>
	                    <th>Thu</th>
	                    <th>Fri</th>
	                    <th>Sat</th>
	                    <th>Sun</th>
	                </tr>
	            </thead>
	            <tbody id="calendarGrid">
	                <!-- JS 動態填入 9–21 的每一行 -->
	            </tbody>
	        </table>
	
	        <div class="mt-4 flex gap-4 text-[10px] justify-center border-t pt-2">
	            <div class="flex items-center gap-1"><span class="w-3 h-3 bg-available rounded-full"></span> 可預約</div>
	            <div class="flex items-center gap-1"><span class="w-3 h-3 bg-booked rounded-full"></span> 已被訂</div>
	            <div class="flex items-center gap-1"><span class="w-3 h-3 bg-unavailable rounded-full"></span> 不開放</div>
	        </div>
	    </div>
	</div>

    <script>
        const cal = document.getElementById('floatingCalendar');
        const calName = document.getElementById('calTeacherName');
        const calGrid = document.getElementById('calendarGrid');

        let isPinned = false; // 是否已固定在畫面中央

        function loadSchedule(teacherId) {
            fetch(`/view/teacher_schedule/${teacherId}`)
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById("calendarGrid");
                    grid.innerHTML = "";

                    for (let hour = 9; hour <= 21; hour++) {
                        const row = document.createElement("tr");

                        const timeCell = document.createElement("td");
                        timeCell.innerText = hour + ":00";
                        row.appendChild(timeCell);

                        for (let d = 1; d <= 7; d++) {
                            const cell = document.createElement("td");
                            cell.style.height = "20px";
                            let colorClass = "bg-unavailable";
                            if (data[d] && data[d][hour]) {
                                colorClass = data[d][hour];
                            }
                            cell.className = colorClass;
                            row.appendChild(cell);
                        }

                        grid.appendChild(row);
                    }
                });
        }

        function showCalendar(e, name, teacherId) {
            if (isPinned) return; // 已固定時，懸停不影響

            calName.innerText = name + " 的課表";
            cal.style.position = 'absolute';
            cal.style.transform = '';
            cal.style.top = '';
            cal.style.left = '';
            cal.style.display = 'block';
            moveCalendar(e);
            loadSchedule(teacherId);
        }

        function pinCalendar(e, name, teacherId) {
            e.stopPropagation(); // 防止觸發 document click 立即關閉

            isPinned = true;
            calName.innerText = name + " 的課表";

            // 固定在畫面正中央（fixed 定位）
            cal.style.position = 'fixed';
            cal.style.left = '50%';
            cal.style.top = '50%';
            cal.style.transform = 'translate(-50%, -50%)';
            cal.style.pointerEvents = 'auto';
            cal.style.display = 'block';

            loadSchedule(teacherId);
        }

        function moveCalendar(e) {
            if (isPinned) return;

            const offsetX = 15;
            const offsetY = 15;
            let x = e.pageX + offsetX;
            let y = e.pageY + offsetY;

            const winWidth = window.innerWidth;
            if (x + 600 > winWidth) {
                x = e.pageX - 620;
            }

            cal.style.left = x + 'px';
            cal.style.top = y + 'px';
        }

        function hideCalendar() {
            if (isPinned) return; // 已固定時，離開滑鼠不隱藏
            cal.style.display = 'none';
        }

        // 點擊畫面其他地方 → 關閉並解除固定
        document.addEventListener('click', function () {
            if (isPinned) {
                isPinned = false;
                cal.style.display = 'none';
                cal.style.position = 'absolute';
                cal.style.transform = '';
                cal.style.pointerEvents = 'none';
            }
        });
    </script>
</body>
</html>
