<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>教師預約</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        .search-section { background: #f4f4f4; padding: 20px; border-radius: 8px; }
        .filter-group { margin-bottom: 10px; display: inline-block; margin-right: 15px; }
        select, input { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        
		/* 課表容器：預設隱藏，絕對定位在滑鼠附近 */
		.schedule-tooltip {
		    display: none;
		    position: absolute;
		    background: white;
		    border: 1px solid #ccc;
		    padding: 15px;
		    z-index: 999;
		    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
		    border-radius: 8px;
		    width: 350px;
		}
		
		/* 當滑鼠移到該列老師時，顯示課表 */
		.teacher-row:hover .schedule-tooltip {
		    display: block;
		}
		
		/* 課表表格樣式 */
		.mini-calendar { border-collapse: collapse; width: 100%; }
		.mini-calendar th, .mini-calendar td { 
		    border: 1px solid #eee; 
		    padding: 6px; 
		    text-align: center; 
		    font-size: 12px;
		}
		.mini-calendar th { background: #f8f9fa; }
		
		/* 有課時的青綠色方塊 (對應您給的圖) */
		.active-slot { 
		    background-color: #4dd0e1 !important; 
		    border-radius: 2px;
		}
    </style>
</head>
<body>

    <div class="search-section">
        <h2>媒合搜尋</h2>
        <form th:action="@{/view/teachers}" method="get">
            <div class="filter-group">
                <label>學生年紀：</label>
                <select name="age">
                    <option value="">全部</option>
                    <option value="under_5" th:selected="${currentAge == 'under_5'}">5歲以下</option>
                    <option value="6_10" th:selected="${currentAge == '6_10'}">6-10歲</option>
                    <option value="11_18" th:selected="${currentAge == '11_18'}">11-18歲</option>
                    <option value="19_25" th:selected="${currentAge == '19_25'}">19-25歲</option>
                    <option value="26_44" th:selected="${currentAge == '26_44'}">26-44歲</option>
                    <option value="45_64" th:selected="${currentAge == '45_64'}">45-64歲</option>
                    <option value="65_plus" th:selected="${currentAge == '65_plus'}">65歲以上</option>
                </select>
            </div>

            <div class="filter-group">
                <label>學習需求：</label>
                <select name="need">
                    <option value="">全部</option>
                    <option value="conversation" th:selected="${currentNeed == 'conversation'}">日常會話</option>
                    <option value="speaking" th:selected="${currentNeed == 'speaking'}">口說練習</option>
                    <option value="listening" th:selected="${currentNeed == 'listening'}">聽力強化</option>
                    <option value="business" th:selected="${currentNeed == 'business'}">商務英文</option>
                    <option value="abroad" th:selected="${currentNeed == 'abroad'}">出國留學</option>
                    <option value="TOEFL" th:selected="${currentNeed == 'TOEFL'}">托福檢定</option>
                    <option value="TOEIC" th:selected="${currentNeed == 'TOEIC'}">多益檢定</option>
                </select>
            </div>

            <div class="filter-group">
                <label>上課日期：</label>
                <select name="day">
                    <option value="">全部</option>
                    <option value="weekday" th:selected="${currentDay == 'weekday'}">平日</option>
                    <option value="weekend" th:selected="${currentDay == 'weekend'}">週末</option>
                </select>
            </div>

            <div class="filter-group">
                <label>偏好時段：</label>
                <select name="time">
                    <option value="">全部</option>
                    <option value="morning_before_12" th:selected="${currentTime == 'morning_before_12'}">上午 (12點前)</option>
                    <option value="afternoon_12_18" th:selected="${currentTime == 'afternoon_12_18'}">下午 (12-18點)</option>
                    <option value="evening_18_24" th:selected="${currentTime == 'evening_18_24'}">晚上 (18點後)</option>
                </select>
            </div>

            <div class="filter-group">
                <label>老師國籍：</label>
                <select name="nation">
                    <option value="">全部</option>
                    <option value="Taiwan" th:selected="${currentNation == 'Taiwan'}">台灣</option>
                    <option value="USA" th:selected="${currentNation == 'USA'}">美國</option>
                    <option value="Japan" th:selected="${currentNation == 'Japan'}">日本</option>
                    <option value="Spain" th:selected="${currentNation == 'Spain'}">西班牙</option>
                </select>
            </div>

            <div class="filter-group">
			    <label>費用：</label>
			    <select name="feeRange">
			        <option value="">全部</option>
			        <option value="350-450" th:selected="${currentFeeRange == '350-450'}">350 ~ 450</option>
			        <option value="451-650" th:selected="${currentFeeRange == '451-650'}">450 ~ 650</option>
			        <option value="651-800" th:selected="${currentFeeRange == '651-800'}">650 ~ 800</option>
			        <option value="800plus" th:selected="${currentFeeRange == '800plus'}">800 以上</option>
			    </select>
			</div>

            <button type="submit" style="background: #007bff; color: white; border: none; padding: 8px 15px; cursor: pointer;">搜尋老師</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>講師姓名</th>
                <th style="width: 30%;">自我介紹</th>
                <th>國籍</th>
                <th>適合年紀</th>
                <th>教學需求</th>
                <th>可上課日</th>
                <th>時段</th>
                <th>每小時費用</th>
            </tr>
        </thead>
        <tbody>
		    <tr th:each="t : ${teachers.content}">
		        <td th:text="${t.teacherName}"></td>
		        <td th:text="${t.selfIntro}"></td>
		        <td th:text="${utils.translateSingle(t.nationality)}"></td>
		        
		        <td>
		            <div style="display: flex; flex-wrap: wrap; gap: 5px;">
		                <span th:each="label : ${utils.translateSet(t.studentAge)}" 
		                      th:text="${label}" 
		                      style="background:#e1f5fe; padding:2px 5px; border-radius:4px; font-size: 0.85em;"></span>
		            </div>
		        </td>
		
		        <td>
		            <div style="display: flex; flex-wrap: wrap; gap: 5px;">
		                <span th:each="label : ${utils.translateSet(t.learningNeed)}" 
		                      th:text="${label}" 
		                      style="background:#f1f8e9; padding:2px 5px; border-radius:4px; font-size: 0.85em;"></span>
		            </div>
		        </td>
		
		        <td>
		            <div style="display: flex; flex-wrap: wrap; gap: 5px;">
		                <span th:each="dayLabel : ${utils.translateSet(t.availableDays)}" 
		                      th:text="${dayLabel}"
		                      style="background-color: #f3e5f5; color: #4a148c; padding: 2px 10px; border-radius: 15px; font-size: 0.85em; white-space: nowrap; border: 1px solid #d1c4e9;">
		                </span>
		            </div>
		        </td>
		
		        <td>
		            <div style="display: flex; flex-wrap: wrap; gap: 5px;">
		                <span th:each="label : ${utils.translateSet(t.availableTime)}" 
		                      th:text="${label}" 
		                      style="background:#fff3e0; padding:2px 5px; border-radius:4px; font-size: 0.85em;"></span>
		            </div>
		        </td>
		
		        <td th:text="${t.fee}"></td>
		    </tr>
		    <tr th:each="t : ${teachers.content}" class="teacher-row">
		        <td style="position: relative; cursor: pointer; color: #007bff;">
		            查閱時段
		            <div class="schedule-tooltip">
		                <h4 style="margin: 0 0 10px 0; color: #333;">教師週課表</h4>
		                <table class="mini-calendar">
		                    <thead>
		                        <tr>
		                            <th>時段</th>
		                            <th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th>
		                        </tr>
		                    </thead>
		                    <tbody>
		                        <tr th:each="slot : ${ {'morning_06_12', 'afternoon_12_18', 'evening_18_24'} }">
		                            <td th:text="${utils.translateSingle(slot)}" style="font-weight: bold;"></td>
		                            <td th:each="day : ${ {'Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'} }"
		                                th:classappend="${utils.hasSchedule(t.schedules, day, slot)} ? 'active-slot' : ''">
		                            </td>
		                        </tr>
		                    </tbody>
		                </table>
		                <p style="font-size: 11px; color: #666; margin-top: 8px;">* 青綠色表示老師該時段可預約</p>
		            </div>
		        </td>
		        
		     </tr>
		</tbody>
    </table>

    <div style="margin-top: 20px;">
        <span>頁碼：[[${currentPage + 1}]] / [[${totalPages}]]</span>
        <div th:if="${totalPages > 0}">
            <a th:if="${currentPage > 0}" 
			   th:href="@{/view/teachers(page=${currentPage-1}, age=${currentAge}, need=${currentNeed}, day=${currentDay}, time=${currentTime}, nation=${currentNation}, feeRange=${currentFeeRange})}">
			   上一頁
			</a>
			
			<a th:if="${currentPage < totalPages-1}" 
			   th:href="@{/view/teachers(page=${currentPage+1}, age=${currentAge}, need=${currentNeed}, day=${currentDay}, time=${currentTime}, nation=${currentNation}, feeRange=${currentFeeRange})}">
			   下一頁
			</a>
        </div>
    </div>
    

</body>
</html>
