<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課程列表</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background-color: #f8f8f8; }
    .filter-buttons button { margin-right: 10px; padding: 5px 10px; cursor: pointer; }
    .pagination ul { list-style-type:none; display:flex; justify-content:center; padding:0; }
    .pagination li { margin:0 5px; }
    .pagination a.active { font-weight:bold; color:#FF8E53; }

    /* 浮動課表視窗 */
    #floatingCalendar {
        display: none;
        position: absolute;
        z-index: 9999;
        width: 500px;
        pointer-events: none;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        border: 2px solid #FF8E53;
        transition: opacity 0.2s;
        background: #fff;
    }
    .bg-available { background-color: #4CAF50; }   /* 綠色 */
    .bg-booked { background-color: #FF9800; }      /* 橘色 */
    .bg-unavailable { background-color: #9E9E9E; } /* 灰色 */
</style>
</head>
<body>
    <div class="search-section">
        <form th:action="@{/view/courses}" method="get">
            <input type="text" name="teacherName" th:value="${currentTeacherName}" placeholder="搜尋老師姓名...">

            <!-- 第一層：大類別 -->
            <select name="subjectCategory" id="subjectCategory">
                <option value="">所有科目</option>
                <option value="10" th:selected="${currentSubjectCategory == 10}">年級課程</option>
                <option value="20" th:selected="${currentSubjectCategory == 20}">檢定與升學</option>
                <option value="30" th:selected="${currentSubjectCategory == 30}">其他</option>
            </select>

            <!-- 第二層：具體科目（Thymeleaf 伺服器端控制初始顯示，JS 控制動態切換） -->
            <select name="subject" id="subjectDetail"
                    th:style="${currentSubjectCategory != null} ? '' : 'display:none'">
                <option value="">所有小類</option>
                <!-- 年級課程 -->
                <option value="11"
                        th:if="${currentSubjectCategory == 10 or currentSubject == 11}"
                        th:selected="${currentSubject == 11}">低年級</option>
                <option value="12"
                        th:if="${currentSubjectCategory == 10 or currentSubject == 12}"
                        th:selected="${currentSubject == 12}">中年級</option>
                <option value="13"
                        th:if="${currentSubjectCategory == 10 or currentSubject == 13}"
                        th:selected="${currentSubject == 13}">高年級</option>
                <!-- 檢定與升學 -->
                <option value="21"
                        th:if="${currentSubjectCategory == 20 or currentSubject == 21}"
                        th:selected="${currentSubject == 21}">GEPT</option>
                <option value="22"
                        th:if="${currentSubjectCategory == 20 or currentSubject == 22}"
                        th:selected="${currentSubject == 22}">YLE</option>
                <option value="23"
                        th:if="${currentSubjectCategory == 20 or currentSubject == 23}"
                        th:selected="${currentSubject == 23}">國中先修</option>
                <!-- 其他 -->
                <option value="31"
                        th:if="${currentSubjectCategory == 30 or currentSubject == 31}"
                        th:selected="${currentSubject == 31}">其他</option>
            </select>

            <select name="priceRange">
                <option value="">所有價格</option>
                <option value="300-500" th:selected="${currentPriceRange == '300-500'}">$300 - $500</option>
                <option value="501-700" th:selected="${currentPriceRange == '501-700'}">$501 - $700</option>
                <option value="701-900" th:selected="${currentPriceRange == '701-900'}">$701 - $900</option>
            </select>

            <select name="weekday">
                <option value="">所有星期</option>
                <option value="1" th:selected="${currentWeekday == 1}">星期一</option>
                <option value="2" th:selected="${currentWeekday == 2}">星期二</option>
                <option value="3" th:selected="${currentWeekday == 3}">星期三</option>
                <option value="4" th:selected="${currentWeekday == 4}">星期四</option>
                <option value="5" th:selected="${currentWeekday == 5}">星期五</option>
                <option value="6" th:selected="${currentWeekday == 6}">星期六</option>
                <option value="7" th:selected="${currentWeekday == 7}">星期日</option>
            </select>

            <select name="timeSlot">
                <option value="">所有時段</option>
                <option value="morning"   th:selected="${currentHour == 'morning'}">上午 (9-13)</option>
                <option value="afternoon" th:selected="${currentHour == 'afternoon'}">下午 (13-17)</option>
                <option value="evening"   th:selected="${currentHour == 'evening'}">晚上 (17-21)</option>
            </select>

            <button type="submit">立即搜尋</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>老師</th>
                <th>課程標題</th>
                <th>科目</th>
                <th>介紹</th>
                <th>課表</th>
                <th>價格</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${courses}">
                <td>
                    <a th:href="@{/tutor/{id}(id=${c.tutorId})}" style="text-decoration:none; color:inherit;">
                        <img th:if="${c.avatarUrl != null}" th:src="${c.avatarUrl}"
                             style="width:40px; height:40px; border-radius:50%; object-fit:cover; display:block; margin:0 auto 4px;">
                        <div th:text="${c.teacherName}" style="font-weight:bold;"></div>
                        <div th:if="${c.headline != null}" th:text="${c.headline}"
                             style="font-size:11px; color:#888; margin-top:2px;"></div>
                    </a>
                </td>
                <td th:text="${c.courseName}"></td>
                <td th:text="${c.subject == 11 ? '低年級' :
                               c.subject == 12 ? '中年級' :
                               c.subject == 13 ? '高年級' :
                               c.subject == 21 ? 'GEPT' :
                               c.subject == 22 ? 'YLE' :
                               c.subject == 23 ? '國中先修' : '其他'}"></td>
                <td th:text="${c.description}"></td>
                <td>
                    <div class="schedule-trigger"
                         th:attr="onmouseenter=|showCalendar(event, '${c.teacherName}', ${c.id})|, onclick=|pinCalendar(event, '${c.teacherName}', ${c.id})|"
                         onmousemove="moveCalendar(event)"
                         onmouseleave="hideCalendar()">
                        <span style="color: #6C63FF; cursor: pointer; border-bottom: 1px dashed #6C63FF;">
                            <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">calendar_month</span>
                            查看課表
                        </span>
                    </div>
                </td>
                <td th:text="${'$' + c.price}"></td>
            </tr>
        </tbody>
    </table>

    <!-- 分頁導航 -->
    <div class="pagination">
        <ul>
            <li th:if="${currentPage > 0}">
                <a th:href="@{/view/courses(page=${currentPage - 1}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subjectCategory=${currentSubjectCategory}, subject=${currentSubject}, priceRange=${currentPriceRange}, weekday=${currentWeekday}, timeSlot=${currentHour})}">
                    上一頁
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/view/courses(page=${i}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subjectCategory=${currentSubjectCategory}, subject=${currentSubject}, priceRange=${currentPriceRange}, weekday=${currentWeekday}, timeSlot=${currentHour})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? 'active' : ''">
                </a>
            </li>
            <li th:if="${currentPage < totalPages - 1}">
                <a th:href="@{/view/courses(page=${currentPage + 1}, teacherName=${currentTeacherName}, courseName=${currentCourseName}, subjectCategory=${currentSubjectCategory}, subject=${currentSubject}, priceRange=${currentPriceRange}, weekday=${currentWeekday}, timeSlot=${currentHour})}">
                    下一頁
                </a>
            </li>
        </ul>
    </div>

    <!-- 浮動課表視窗 -->
	<div id="floatingCalendar">
	    <header class="p-4 bg-gradient-to-r from-primary to-orange-400 text-white">
	        <h3 class="text-xl font-bold" id="calTeacherName">老師課表</h3>
	        <p class="text-xs opacity-90">每週固定開放時段 (僅供參考)</p>
	    </header>
	
	    <div class="p-4 bg-white">
	        <table style="width:100%; border-collapse: collapse; font-size: 12px; text-align: center;">
	            <thead>
	                <tr>
	                    <th>時間</th>
	                    <th>Mon</th>
	                    <th>Tue</th>
	                    <th>Wed</th>
	                    <th>Thu</th>
	                    <th>Fri</th>
	                    <th>Sat</th>
	                    <th>Sun</th>
	                </tr>
	            </thead>
	            <tbody id="calendarGrid">
	                <!-- JS 動態填入 9–21 的每一行 -->
	            </tbody>
	        </table>
	
	        <div class="mt-4 flex gap-4 text-[10px] justify-center border-t pt-2">
	            <div class="flex items-center gap-1"><span class="w-3 h-3 bg-available rounded-full"></span> 開放時段</div>
	            <div class="flex items-center gap-1"><span class="w-3 h-3 bg-unavailable rounded-full"></span> 不開放</div>
	        </div>
	    </div>
	</div>

    <script>
        // ── 科目兩層聯動 ──────────────────────────────────────────────
        // 新增科目只需改這裡
        const subjectMap = {
            10: [
                { value: '11', label: '低年級' },
                { value: '12', label: '中年級' },
                { value: '13', label: '高年級' }
            ],
            20: [
                { value: '21', label: 'GEPT' },
                { value: '22', label: 'YLE' },
                { value: '23', label: '國中先修' }
            ],
            30: [
                { value: '31', label: '其他' }
            ]
        };

        const categoryEl = document.getElementById('subjectCategory');
        const detailEl   = document.getElementById('subjectDetail');

        function renderDetailOptions(categoryVal, selectedSubject) {
            const options = subjectMap[categoryVal] || [];
            detailEl.innerHTML = '<option value="">所有小類</option>';
            options.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt.value;
                el.textContent = opt.label;
                if (String(selectedSubject) === opt.value) el.selected = true;
                detailEl.appendChild(el);
            });
        }

        function onCategoryChange(sel) {
            const val = parseInt(sel.value);
            if (val && subjectMap[val]) {
                renderDetailOptions(val, null);
                detailEl.style.display = '';
            } else {
                detailEl.style.display = 'none';
                detailEl.value = '';
            }
        }

        // 頁面載入時：Thymeleaf 已在伺服器端還原 option 與 selected
        // JS 只需把 DOM 上已選中的小類值同步回 detailEl.value
        (function restoreState() {
            // 找出 Thymeleaf 已渲染為 selected 的小類 option
            const selectedOpt = detailEl.querySelector('option[selected]');
            if (selectedOpt) {
                detailEl.value = selectedOpt.value;
            }
        })();

        categoryEl.addEventListener('change', function () {
            onCategoryChange(this);
        });
        // ─────────────────────────────────────────────────────────────
    </script>

    <script>
        const cal = document.getElementById('floatingCalendar');
        const calName = document.getElementById('calTeacherName');
        const calGrid = document.getElementById('calendarGrid');

        let isPinned = false; // 是否已固定在畫面中央

        function loadSchedule(tutorId) {
            fetch(`/view/teacher_schedule/${tutorId}`)
                .then(response => response.json())
                .then(data => {
                    // data 格式: { "1": [9, 10, 14], "3": [13, 17] }
                    const grid = document.getElementById("calendarGrid");
                    grid.innerHTML = "";

                    for (let hour = 9; hour <= 21; hour++) {
                        const row = document.createElement("tr");

                        const timeCell = document.createElement("td");
                        timeCell.innerText = hour + ":00";
                        row.appendChild(timeCell);

                        for (let d = 1; d <= 7; d++) {
                            const cell = document.createElement("td");
                            cell.style.height = "20px";
                            // data[d] 是該星期的小時陣列
                            const hasSlot = data[d] && data[d].includes(hour);
                            cell.className = hasSlot ? "bg-available" : "bg-unavailable";
                            row.appendChild(cell);
                        }

                        grid.appendChild(row);
                    }
                });
        }

        function showCalendar(e, name, tutorId) {
            if (isPinned) return;

            calName.innerText = name + " 的課表";
            cal.style.position = 'absolute';
            cal.style.transform = '';
            cal.style.top = '';
            cal.style.left = '';
            cal.style.display = 'block';
            moveCalendar(e);
            loadSchedule(tutorId);
        }

        function pinCalendar(e, name, tutorId) {
            e.stopPropagation();

            isPinned = true;
            calName.innerText = name + " 的課表";

            cal.style.position = 'fixed';
            cal.style.left = '50%';
            cal.style.top = '50%';
            cal.style.transform = 'translate(-50%, -50%)';
            cal.style.pointerEvents = 'auto';
            cal.style.display = 'block';

            loadSchedule(tutorId);
        }

        function moveCalendar(e) {
            if (isPinned) return;

            const offsetX = 15;
            const offsetY = 15;
            let x = e.pageX + offsetX;
            let y = e.pageY + offsetY;

            const winWidth = window.innerWidth;
            if (x + 600 > winWidth) {
                x = e.pageX - 620;
            }

            cal.style.left = x + 'px';
            cal.style.top = y + 'px';
        }

        function hideCalendar() {
            if (isPinned) return; // 已固定時，離開滑鼠不隱藏
            cal.style.display = 'none';
        }

        // 點擊畫面其他地方 → 關閉並解除固定
        document.addEventListener('click', function () {
            if (isPinned) {
                isPinned = false;
                cal.style.display = 'none';
                cal.style.position = 'absolute';
                cal.style.transform = '';
                cal.style.pointerEvents = 'none';
            }
        });
    </script>
</body>
</html>
